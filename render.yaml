services:
  - type: web
    name: iai-test-ui
    runtime: node
    plan: free
    buildCommand: (cd server && npm install) && (cd client && npm install --include=dev) && (cd client && npm run build)
    startCommand: bash server/scripts/startup.sh
    envVars:
      - key: PW_FRAMEWORK_PATH
        value: /opt/render/project/playwright-automation-framework
      - key: PW_AUTO_GITHUB_TOKEN
        sync: false
      - key: PW_AUTO_JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
